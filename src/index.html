<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Novelist IDE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Shoelace UI -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.14.0/cdn/themes/dark.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.14.0/cdn/shoelace-autoloader.js"></script>
</head>
<body class="dark-pro sl-theme-dark">
    <div id="app">
        <!-- 1. Activity Bar -->
        <nav id="activity-bar">
            <div class="activity-top">
                <div class="activity-icon active" id="nav-explorer" title="Explorer">
                    <i data-lucide="files"></i>
                </div>
                <div class="activity-icon" id="nav-search" title="Search">
                    <i data-lucide="search"></i>
                </div>
                <div class="activity-icon" id="nav-story-settings" title="Story Settings">
                    <i data-lucide="settings"></i>
                </div>
            </div>
            <div class="activity-bottom">
                <div class="activity-icon" id="nav-profile" title="Account">
                    <i data-lucide="user-circle"></i>
                </div>
            </div>
        </nav>

        <!-- 2. Sidebar: Explorer -->
        <aside id="sidebar">
            <div class="sidebar-section" id="section-stories">
                <div class="sidebar-header">
                    <span>THƯ MỤC TRUYỆN</span>
                    <div class="sidebar-actions">
                        <button id="new-story-btn" title="Tạo truyện mới"><i data-lucide="folder-plus"></i></button>
                        <button id="open-folder-btn" title="Mở thư mục"><i data-lucide="folder-open"></i></button>
                    </div>
                </div>
                <div id="stories-list" class="sidebar-list">
                    <!-- This area can be used for "Recent Folders" if needed, but for now we'll keep it simple -->
                </div>
            </div>

            <div class="sidebar-section" id="section-explorer">
                <div class="sidebar-header">
                    <span id="story-title-display">EXPLORER</span>
                    <div class="sidebar-actions">
                        <button id="new-file-btn" title="Tạo tệp mới"><i data-lucide="file-plus"></i></button>
                        <button id="new-folder-btn" title="Tạo thư mục mới"><i data-lucide="folder-plus"></i></button>
                        <button id="rename-node-btn" title="Đổi tên"><i data-lucide="edit-3"></i></button>
                        <button id="delete-node-btn" title="Xóa"><i data-lucide="trash-2"></i></button>
                        <button id="refresh-explorer" title="Làm mới"><i data-lucide="rotate-cw"></i></button>
                    </div>
                </div>
                <sl-tree id="explorer-tree" selection="single">
                    <!-- Recursive Node Tree -->
                </sl-tree>
            </div>
            
            <div id="sidebar-status-area">
                <div class="status-item"><i data-lucide="book"></i> <span id="status-story-name">No story</span></div>
                <div class="status-item"><i data-lucide="hash"></i> <span id="word-count">Chars: 0</span></div>
                <div class="status-item"><i data-lucide="cpu"></i> <span id="ai-model">Gemma 4</span></div>
                <div class="status-item" id="sync-status"><i data-lucide="hard-drive"></i> File System</div>
            </div>
        </aside>

        <!-- 3. Main Body: Tabs + Editor -->
        <main id="editor-container">
            <!-- Tabs -->
            <div id="tab-bar">
                <div id="tabs-list"></div>
            </div>

            <!-- Content Area -->
            <section id="editor-area">
                <div id="editor-header">
                    <h2 id="current-file-name">Chào mừng</h2>
                    <div class="editor-actions">
                    </div>
                </div>
                <div id="story-editor-wrapper">
                    <div id="story-editor" contenteditable="true">
                        <!-- Content here -->
                    </div>
                </div>
                
            </section>
        </main>

        <!-- 4. Right Panel: AI Chat -->
        <aside id="chat-panel">
            <div class="chat-header">
                <h3><i data-lucide="message-square"></i> AI Assistant</h3>
                <button id="clear-chat-btn"><i data-lucide="trash-2"></i></button>
            </div>
            <div id="chat-messages">
                <!-- Messages -->
            </div>
            <div class="chat-input-wrapper">
                <textarea id="chat-input" placeholder="Hỏi AI về cốt truyện, nhân vật..."></textarea>
                <button id="send-chat-btn"><i data-lucide="send"></i></button>
            </div>
        </aside>

    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="hidden">
        <sl-menu id="explorer-context-menu">
            <sl-menu-item value="new-file"><sl-icon slot="prefix" name="file-earmark-plus"></sl-icon> File mới</sl-menu-item>
            <sl-menu-item value="new-folder"><sl-icon slot="prefix" name="folder-plus"></sl-icon> Thư mục mới</sl-menu-item>
            <sl-divider></sl-divider>
            <sl-menu-item value="rename"><sl-icon slot="prefix" name="pencil"></sl-icon> Đổi tên</sl-menu-item>
            <sl-menu-item value="delete"><sl-icon slot="prefix" name="trash"></sl-icon> Xóa</sl-menu-item>
        </sl-menu>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h3 id="modal-title">Tên truyện mới</h3>
            <input type="text" id="modal-input">
            <div class="modal-actions">
                <button id="modal-cancel">Hủy</button>
                <button id="modal-confirm">Xác nhận</button>
            </div>
        </div>
    </div>

    <script>
        // Initial lucide icons
        lucide.createIcons();
    </script>
    <!-- Entry Point ES Module -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
